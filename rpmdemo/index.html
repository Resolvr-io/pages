        <style>
            @import url("https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap");

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #000;
                color: #fff;
                font-family: "Satoshi", sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .view {
                display: none;
                width: 100%;
                max-width: 640px;
                margin: 0 auto;
                padding: 40px 24px;
                text-align: center;
            }

            .view.active {
                display: block;
            }

            #watch {
                max-width: 1200px;
            }

            /* Landing animated SVG logo */
            .preview-wrap {
                width: 50%;
                max-width: 544px;
                margin: 0 auto 40px;
            }

            .preview-wrap svg {
                width: 100%;
                height: 100%;
                overflow: visible;
            }

            .preview-wrap .top-group {
                animation: slideUp 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)
                    2.8s both;
            }
            @keyframes slideUp {
                from {
                    transform: translateY(64px);
                }
                to {
                    transform: translateY(0);
                }
            }
            .preview-wrap .icon-translate {
                animation: iconSlide 2.8s cubic-bezier(0.4, 0, 0.2, 1) 0s both;
            }
            @keyframes iconSlide {
                0% {
                    transform: translate(107px, 0);
                }
                100% {
                    transform: translate(0, 0);
                }
            }
            .preview-wrap .icon-rotate {
                transform-origin: 36.5px 36.5px;
                animation: iconFadeAndSpin 2.8s cubic-bezier(0.4, 0, 0.2, 1) 0s
                    both;
            }
            @keyframes iconFadeAndSpin {
                0% {
                    opacity: 0;
                    transform: rotate(0deg);
                }
                20% {
                    opacity: 1;
                }
                100% {
                    opacity: 1;
                    transform: rotate(-360deg);
                }
            }
            .preview-wrap .rpm-letters {
                animation: fadeInSvg 0.8s ease-out 1.8s both;
            }
            .preview-wrap .bar {
                animation: fadeInSvg 0.6s ease-out 3.8s both;
            }
            .preview-wrap .bottom {
                animation: fadeInSvg 0.8s ease-out 4.2s both;
            }
            @keyframes fadeInSvg {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .btn {
                padding: 14px 28px;
                border: none;
                border-radius: 8px;
                background: #14affe;
                color: #000;
                font-family: "Satoshi", sans-serif;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
                white-space: nowrap;
            }

            .btn:hover {
                background: #0099e6;
            }

            /* Full demo video */
            .video-wrap {
                width: 100%;
                max-width: 1080px;
                margin: 0 auto 36px;
                border-radius: 12px;
                overflow: hidden;
                background: #111;
                position: relative;
            }

            .video-wrap video {
                width: 100%;
                display: block;
            }

            .video-slate {
                position: absolute;
                inset: 0;
                border: 0;
                background: linear-gradient(
                    180deg,
                    rgba(0, 0, 0, 0.2) 0%,
                    rgba(0, 0, 0, 0.6) 100%
                );
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                cursor: pointer;
                transition: opacity 0.2s ease;
            }

            .video-slate.hidden {
                opacity: 0;
                pointer-events: none;
            }

            .video-slate .play-pill {
                width: 78px;
                height: 78px;
                border-radius: 999px;
                border: 2px solid rgba(255, 255, 255, 0.9);
                background: rgba(0, 0, 0, 0.35);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .video-slate .play-triangle {
                width: 0;
                height: 0;
                margin-left: 4px;
                border-top: 12px solid transparent;
                border-bottom: 12px solid transparent;
                border-left: 18px solid #fff;
            }

            .video-slate .play-text {
                font-family: "Satoshi", sans-serif;
                font-size: 17px;
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            .logo-small {
                margin: 40px auto 0;
                width: 85px;
            }

            .logo-small img {
                width: 100%;
                height: auto;
                display: block;
                filter: brightness(0) invert(1);
            }

            .btn-outline {
                display: inline-block;
                padding: 14px 32px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 8px;
                background: transparent;
                color: #fff;
                font-family: "Satoshi", sans-serif;
                font-size: 16px;
                font-weight: 500;
                cursor: pointer;
                text-decoration: none;
                transition:
                    background 0.2s,
                    border-color 0.2s;
            }

            .btn-outline:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.5);
            }

            @media (max-width: 520px) {
                .preview-wrap {
                    width: 85%;
                }
            }
        </style>

        </div>

        <script>
            const watchBtn = document.getElementById("watchBtn");
            const demoVideo = document.getElementById("demoVideo");
            const videoSlate = document.getElementById("videoSlate");

            function showView(name) {
                document
                    .querySelectorAll(".view")
                    .forEach((v) => v.classList.remove("active"));
                document.getElementById(name).classList.add("active");
            }

            watchBtn.addEventListener("click", () => {
                showView("watch");
            });

            videoSlate.addEventListener("click", async () => {
                try {
                    await demoVideo.play();
                    videoSlate.classList.add("hidden");
                } catch (err) {
                    videoSlate.classList.remove("hidden");
                }
            });

            demoVideo.addEventListener("play", () =>
                videoSlate.classList.add("hidden"),
            );
            demoVideo.addEventListener("ended", () =>
                videoSlate.classList.remove("hidden"),
            );
        </script>
    </body>
</html>
