    <style>
      @import url("https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap");

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --orange: #fb923c;
        --blue: #14affe;
        --black: #000000;
        --white: #ffffff;
        --bg: var(--black);
        --text: var(--white);
        --text-muted: rgba(255, 255, 255, 0.6);
        --card-bg: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.1);
        --card-hover: rgba(255, 255, 255, 0.1);
        color-scheme: dark;
      }

      [data-theme="light"] {
        --bg: #f5f5f5;
        --text: #111111;
        --text-muted: rgba(0, 0, 0, 0.55);
        --card-bg: rgba(0, 0, 0, 0.04);
        --card-border: rgba(0, 0, 0, 0.1);
        --card-hover: rgba(0, 0, 0, 0.08);
        color-scheme: light;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Satoshi", -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 20px 40px;
        transition: background 0.3s, color 0.3s;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      /* Theme toggle */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-muted);
        transition: background 0.2s, color 0.2s;
        z-index: 10;
      }

      .theme-toggle:hover {
        background: var(--card-hover);
        color: var(--text);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .icon-sun { display: none; }
      .icon-moon { display: block; }
      [data-theme="light"] .icon-sun { display: block; }
      [data-theme="light"] .icon-moon { display: none; }

      /* Avatar */
      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--orange);
      }

      /* Identity */
      .identity {
        text-align: center;
      }

      .name {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.2;
      }

      .title {
        font-size: 15px;
        color: var(--text-muted);
        margin-top: 4px;
        font-weight: 400;
      }

      /* Resolvr block */
      .resolvr-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        transition: opacity 0.15s;
      }

      .resolvr-block:hover {
        opacity: 0.8;
      }

      .resolvr-logo {
        width: 160px;
        height: auto;
      }

      .resolvr-url {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 400;
      }

      /* Link sections */
      .links {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        padding: 0 4px;
        margin-top: 4px;
      }

      .link-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        text-decoration: none;
        color: var(--text);
        transition: background 0.15s, transform 0.15s;
      }

      .link-item:hover {
        background: var(--card-hover);
        transform: translateY(-1px);
      }

      .link-item:active {
        transform: translateY(0);
      }

      .link-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: var(--card-border);
      }

      .link-icon img {
        width: 22px;
        height: 22px;
        object-fit: contain;
      }

      .link-icon svg {
        width: 20px;
        height: 20px;
      }

      .link-icon.branded {
        background: transparent;
      }

      .link-icon.branded img,
      .link-icon.branded svg {
        width: 36px;
        height: 36px;
      }

      .link-label {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
      }

      .link-sublabel {
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 400;
      }

      .link-text {
        display: flex;
        flex-direction: column;
      }

      .link-arrow {
        margin-left: auto;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .link-arrow svg {
        width: 16px;
        height: 16px;
      }

      /* Social row */
      .socials {
        display: flex;
        gap: 12px;
        justify-content: center;
        width: 100%;
      }

      .social-btn {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--text);
        transition: background 0.15s, transform 0.15s;
      }

      .social-btn:hover {
        background: var(--card-hover);
        transform: translateY(-1px);
      }

      .social-btn:active {
        transform: translateY(0);
      }

      .social-btn svg {
        width: 22px;
        height: 22px;
      }

      /* Footer */
      .footer {
        font-size: 12px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 8px;
      }

      /* Light mode logo inversions */
      [data-theme="light"] .logo-invert {
        filter: invert(1);
      }
    </style>

      (function () {
        const toggle = document.querySelector(".theme-toggle");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

        function getTheme() {
          const saved = localStorage.getItem("theme");
          if (saved) return saved;
          return prefersDark.matches ? "dark" : "light";
        }

        function applyTheme(theme) {
          if (theme === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
        }

        applyTheme(getTheme());

        toggle.addEventListener("click", function () {
          const current = getTheme();
          const next = current === "dark" ? "light" : "dark";
          localStorage.setItem("theme", next);
          applyTheme(next);
        });

        prefersDark.addEventListener("change", function (e) {
          if (!localStorage.getItem("theme")) {
            applyTheme(e.matches ? "dark" : "light");
          }
        });
      })();
    </script>
  </body>
</html>
