<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/x-icon"
            href="https://www.resolvr.io/favicon.ico"
        />

        <meta
            name="description"
            content="Astrolabe is the first tokenized reinsurance instrument for bitcoin treasuries, exchanges, and funds. Earn yield from insurance premiums, not lending or staking."
        />
        <meta
            name="keywords"
            content="bitcoin yield, tokenized reinsurance, bitcoin treasury, BTC-native yield, reinsurance instrument, bitcoin insurance premiums"
        />

        <!-- Open Graph / Social Media Card -->
        <meta property="og:title" content="Astrolabe by Resolvr | BTC-Native Yield from Reinsurance" />
        <meta
            property="og:description"
            content="Astrolabe is the first tokenized reinsurance instrument for bitcoin treasuries, exchanges, and funds. Earn yield from insurance premiums, not lending or staking."
        />
        <meta
            property="og:image"
            content="https://mredgyusv1qtkwdp.public.blob.vercel-storage.com/branding/astrolabe/astrolabe_social_card.png"
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://pages.resolvr.io/astrolabe" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Astrolabe by Resolvr | BTC-Native Yield from Reinsurance" />
        <meta
            name="twitter:description"
            content="Astrolabe is the first tokenized reinsurance instrument for bitcoin treasuries, exchanges, and funds. Earn yield from insurance premiums, not lending or staking."
        />
        <meta
            name="twitter:image"
            content="https://mredgyusv1qtkwdp.public.blob.vercel-storage.com/branding/astrolabe/astrolabe_social_card.png"
        />

        <title>Astrolabe by Resolvr | BTC-Native Yield from Reinsurance</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://api.fontshare.com/v2/css?f[]=satoshi@400,500&display=swap");
            body {
                font-family: "Satoshi", sans-serif;
                font-weight: 400;
                background-color: #ffffff;
                color: #000000;
                margin: 0;
                padding: 0;
            }
            header {
                background-color: #000000;
                padding: 1.5rem 2rem;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }
            .header-content {
                display: flex;
                align-items: center;
            }
            main {
                margin-top: 80px;
                margin-bottom: 80px;
            }
            .iframe-container {
                width: 100%;
                height: calc(100vh - 160px);
                position: relative;
            }
            .iframe-container iframe {
                width: 100%;
                height: 100%;
                border: none;
            }
            footer {
                background-color: #000000;
                color: #ffffff;
                text-align: center;
                padding: 2rem;
                font-size: 0.875rem;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="header-content">
                <a href="https://resolvr.io">
                    <img
                        src="https://mredgyusv1qtkwdp.public.blob.vercel-storage.com/branding/logo/resolvr-logo-white.svg"
                        alt="Resolvr Logo"
                        style="width: 110px; height: auto"
                    />
                </a>
            </div>
        </header>

        <main>
            <div class="iframe-container">
                <iframe
                    src="https://forms.resolvr.io/astrolabe"
                    width="100%"
                    height="100%"
                    frameborder="0"
                    marginheight="0"
                    marginwidth="0"
                    title="Astrolabe Registration Form"
                ></iframe>
            </div>
        </main>

        <footer>
            <p>© 2026 Resolvr, Inc.</p>
        </footer>
    </body>
</html>
